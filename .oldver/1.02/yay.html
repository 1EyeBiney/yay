<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YAY! v1.0.2</title>
    <style>
        /* CSS for high contrast dark mode */
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-container {
            width: 80%;
            max-width: 600px;
            border: 2px solid #ffffff;
            padding: 20px;
            min-height: 400px;
            outline: none;
        }

        #game-container:focus {
            border-color: #00ff00;
            box-shadow: 0 0 10px #00ff00;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        button {
            font-size: 1.2rem;
            padding: 10px 20px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #555;
            padding: 12px;
            text-align: left;
            font-size: 1.1rem;
        }

        th {
            background-color: #2a2a2a;
        }

        .current-category {
            background-color: #333333;
            outline: 2px solid #00ff00;
        }

        .total-row td {
            font-weight: bold;
            background-color: #202020;
            border-top: 2px solid #777;
        }
    </style>
</head>
<body>
    <button id="initBtn" autofocus onclick="initGame()">Start Yahtzee</button>
    <div id="game-container" tabindex="0" role="application" aria-label="Yahtzee Scorecard.">
        <h1 style="text-align: center;">Yahtzee Scorecard</h1>
    </div>
    <div id="aria-announce" class="sr-only" aria-live="assertive"></div>

    <script>
        window.YAHTZEE_STATE = {
          // null = empty/unused. 0 = deliberately scratched.
          categories: {
            1: { name: "Aces", value: null, max: 5, step: 1 },
            2: { name: "Twos", value: null, max: 10, step: 2 },
            3: { name: "Threes", value: null, max: 15, step: 3 },
            4: { name: "Fours", value: null, max: 20, step: 4 },
            5: { name: "Fives", value: null, max: 25, step: 5 },
            6: { name: "Sixes", value: null, max: 30, step: 6 },
            T: { name: "Three of a Kind", value: null, max: 30, step: 1 },
            F: { name: "Four of a Kind", value: null, max: 30, step: 1 },
            H: { name: "Full House", value: null, fixed: [0, 25] },
            S: { name: "Small Straight", value: null, fixed: [0, 30] },
            L: { name: "Large Straight", value: null, fixed: [0, 40] },
            Y: { name: "Yahtzee", value: null, fixed: [0, 50] },
            C: { name: "Chance", value: null, max: 30, step: 1 },
            B: { name: "Yahtzee Bonus", value: 0, max: 300, step: 100, locked: true } // Unlocks if Y >= 50
          },
          currentCategory: '1', // Tracks current cursor position
          inputMode: 'nav',     // 'nav', 'score', or 'confirm_reset'
          tempScore: 0,         // Tracks the number being dialed in 'score' mode
          history: [],          // Array of last 5 game objects
          topScores: []         // Array of top 10 highest game objects (sorted descending)
        };

        window.announce = function(msg) {
            const el = document.getElementById('aria-announce');
            if (el) {
                el.textContent = msg;
            }
        };

        window.initGame = function() {
            document.getElementById('initBtn').style.display = 'none';
            const container = document.getElementById('game-container');
            container.focus();
            container.addEventListener('blur', () => setTimeout(() => container.focus(), 10));
            window.announce("Yes! Accessible Yahtzee version 1.0.2 initialized. Press Up or Down arrows to navigate.");
            window.renderScorecard();
        };

        window.renderScorecard = function() {
            const container = document.getElementById('game-container');
            const state = window.YAHTZEE_STATE;
            const categories = state.categories;
            const currentKey = state.currentCategory;

            // --- Math Engine ---
            const upperKeys = ['1', '2', '3', '4', '5', '6'];
            const lowerKeys = ['T', 'F', 'H', 'S', 'L', 'Y', 'C', 'B'];
            
            const upperSubtotal = upperKeys.reduce((sum, key) => sum + (categories[key].value || 0), 0);
            const upperBonus = upperSubtotal >= 63 ? 35 : 0;
            const upperTotal = upperSubtotal + upperBonus;

            const lowerTotal = lowerKeys.reduce((sum, key) => sum + (categories[key].value || 0), 0);

            const grandTotal = upperTotal + lowerTotal;
            // --- End Math Engine ---


            let tableHtml = `
                <table id="scorecard-table">
                    <thead>
                        <tr>
                            <th>Category</th>
                            <th>Score</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            for (const key in categories) {
                const category = categories[key];
                const isCurrent = key === currentKey;
                let score = category.value === null ? '--' : category.value;
                if (state.inputMode === 'score' && isCurrent) {
                    score = `[ ${state.tempScore} ]`;
                }
                
                tableHtml += `
                    <tr class="${isCurrent ? 'current-category' : ''}" data-key="${key}">
                        <td>${category.name}</td>
                        <td>${score}</td>
                    </tr>
                `;
            }

            tableHtml += `
                    <tr class="total-row"><td colspan="2"></td></tr>
                    <tr class="total-row"><td>Upper Subtotal</td><td>${upperSubtotal}</td></tr>
                    <tr class="total-row"><td>Upper Bonus</td><td>${upperBonus}</td></tr>
                    <tr class="total-row"><td>Lower Total</td><td>${lowerTotal}</td></tr>
                    <tr class="total-row"><td><strong>Grand Total</strong></td><td><strong>${grandTotal}</strong></td></tr>
                </tbody>
            </table>`;
            
            const existingTable = document.getElementById('scorecard-table');
            if (existingTable) {
                existingTable.remove();
            }
            container.insertAdjacentHTML('beforeend', tableHtml);
        };

        window.addEventListener('keydown', function(e) {
            const state = window.YAHTZEE_STATE;
            const category = state.categories[state.currentCategory];

            if (state.inputMode === 'nav') {
                if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
                    e.preventDefault();
                    const categoryKeys = Object.keys(state.categories);
                    const currentIndex = categoryKeys.indexOf(state.currentCategory);
                    let nextIndex;

                    if (e.key === 'ArrowDown') {
                        nextIndex = (currentIndex + 1) % categoryKeys.length;
                    } else { // ArrowUp
                        nextIndex = (currentIndex - 1 + categoryKeys.length) % categoryKeys.length;
                    }
                    state.currentCategory = categoryKeys[nextIndex];
                    window.renderScorecard();
                    const newCategory = state.categories[state.currentCategory];
                    const scoreStatus = newCategory.value === null ? 'Empty' : `Score ${newCategory.value}`;
                    window.announce(`${newCategory.name}. ${scoreStatus}.`);
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    state.inputMode = 'score';
                    state.tempScore = category.value === null ? 0 : category.value;
                    window.announce(`Set score for ${category.name}. ${state.tempScore}.`);
                    window.renderScorecard();
                }
            } else if (state.inputMode === 'score') {
                e.preventDefault();
                if (e.key === 'Escape') {
                    state.inputMode = 'nav';
                    window.announce("Cancelled.");
                    window.renderScorecard();
                } else if (e.key === 'Enter') {
                    category.value = state.tempScore;
                    state.inputMode = 'nav';
                    window.renderScorecard();
                    window.announce(`${state.tempScore} points saved in ${category.name}.`);
                } else if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                    if (category.fixed) {
                        const currentIndex = category.fixed.indexOf(state.tempScore);
                        let nextIndex = e.key === 'ArrowUp' ? currentIndex + 1 : currentIndex - 1;
                        if (nextIndex >= category.fixed.length) nextIndex = 0;
                        if (nextIndex < 0) nextIndex = category.fixed.length - 1;
                        state.tempScore = category.fixed[nextIndex];
                    } else {
                        const step = e.shiftKey ? (category.step * 5) : category.step;
                        if (e.key === 'ArrowUp') {
                            state.tempScore += step;
                        } else { // ArrowDown
                            state.tempScore -= step;
                        }
                        // Clamp the value
                        if (state.tempScore > category.max) state.tempScore = category.max;
                        if (state.tempScore < 0) state.tempScore = 0;
                    }
                    window.announce(state.tempScore);
                    window.renderScorecard();
                }
            }
        });
    </script>
</body>
</html>
