<!DOCTYPE html>

    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: sans-serif; max-width: 950px; margin: 0 auto; padding: 40px 20px; }
        h1, h2, p { text-align: center; }
        .button-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 40px; }
        button { padding: 12px; font-size: 1rem; cursor: pointer; background: #222; color: #4CAF50; border: 1px solid #4CAF50; border-radius: 6px; text-align: left; }
        button:focus { background: #4CAF50; color: #000; outline: none; font-weight: bold; }
        .desc { color: #aaa; font-size: 0.85rem; display: block; margin-top: 3px; }
        button:focus .desc { color: #222; }
        .section-header { border-bottom: 2px solid #4CAF50; padding-bottom: 5px; margin-top: 50px; color: #4CAF50; }
    </style>
</head>
<body>

    <h1>Bunker v3.27.3 Audio Laboratory</h1>
    <p>Numbers 1-38 remain as established. Numbers 39-68 are new experimental additions.</p>

    <h2 class="section-header">Section 1: Active Game Functions</h2>

        <button onclick="playGame('success')">15. Project Completion <span class="desc">Project finishes.</span></button>
        <button onclick="playGame('powerUp')">17. Power Up <span class="desc">Turning module ONLINE.</span></button>
        <button onclick="playGame('powerDown')">18. Power Down <span class="desc">Turning module OFFLINE.</span></button>
        <button onclick="playGame('menuSelect')">23. Menu Activation <span class="desc">Salvage or normal menu items.</span></button>
        <button onclick="playGame('lifeboat')">24. Lifeboat Event <span class="desc">Incoming supply pod.</span></button>
        <button onclick="playGame('hazard')">25. Meteor / Worm Strike <span class="desc">Hostile events.</span></button>
        <button onclick="playGame('digStart')">28. Start Excavation <span class="desc">Beginning a dig project.</span></button>
        <button onclick="playGame('unlockBuild')">31. Build / Research / Designate <span class="desc">Starting construction.</span></button>
        <button onclick="playGame('closeMenu')">33. Close Menus <span class="desc">Escape key.</span></button>
        <button onclick="playGame('reports')">38. Reports (R, W, I, H, O) <span class="desc">Diagnostic data.</span></button>
    </div>

    <h2 class="section-header">Section 2: Original Test Bank (9-37)</h2>
    <div class="button-group">
        <button onclick="playTone('sine', 600, null, 0.1, 0.3)">9. Clean Blip</button>
        <button onclick="playTone('sine', 1200, null, 0.05, 0.2)">10. High Tech Tick</button>
        <button onclick="playTone('sine', 150, null, 0.15, 0.4)">11. Low Boop</button>
        <button onclick="playTone('sawtooth', 150, null, 0.3, 0.1)">12. Harsh Buzz</button>
        <button onclick="playTone('triangle', 250, 150, 0.2, 0.3)">13. Deny Tone</button>
        <button onclick="playTone('square', 600, 100, 0.05, 0.05)">14. Typewriter Clack</button>
        <button onclick="playSequence(['sine','sine'], [800, 800], 0.08, 0.2)">16. Alert Double-Beep</button>
        <button onclick="playTone('triangle', 100, 200, 0.3, 0.3)">19. Heavy Door Open</button>
        <button onclick="playTone('triangle', 200, 100, 0.3, 0.3)">20. Heavy Door Close</button>
        <button onclick="playChord([400, 600], 0.3, 0.3)">21. Soft Notify</button>
        <button onclick="playTone('sine', 60, null, 0.5, 0.5)">22. Sub-Bass Pulse</button>
        <button onclick="playGlitch()">26. Data Glitch</button>
        <button onclick="playTone('square', 800, 50, 0.3, 0.05)">27. Retro Laser</button>
        <button onclick="playTone('sine', 1000, 100, 0.5, 0.3)">29. Power Failure</button>
        <button onclick="playEcho('sawtooth', 50, 300, 0.4, 0.1, 0.2)">30. Machine Rev</button>
        <button onclick="playChord([200, 203, 207], 1.0, 0.3)">32. Eerie Drone</button>
        <button onclick="playSequence(['sine','sine','sine'], [600, 600, 600], 0.1, 0.3)">34. Comm Link</button>
        <button onclick="playEcho('sawtooth', 800, 100, 0.2, 0.05, 0.1)">35. Zap</button>
        <button onclick="playChord([150, 300, 600, 1200], 0.4, 0.2)">36. Massive Synth Hit</button>
        <button onclick="playEcho('sine', 600, 800, 0.2, 0.3, 0.2)">37. Bouncing Confirm</button>
    </div>

    <h2 class="section-header">Section 3: New Experimental Bank (39-68)</h2>
    <div class="button-group">
        <button onclick="playChord([55, 110], 2.0, 0.4)">39. Deep Reactor Hum <span class="desc">A very low, steady foundation drone.</span></button>
        <button onclick="playEcho('sine', 2000, 1500, 0.05, 0.1, 0.05)">40. Digital Dewdrop <span class="desc">Ultra-fast, high-pitched echo.</span></button>
        <button onclick="playSweep(100, 110, 100, 1.5)">41. Structural Groan <span class="desc">Slow, low-frequency sawtooth wobble.</span></button>
        <button onclick="playSequence(['sine','triangle','sine'], [200, 400, 200], 0.3, 0.2)">42. Breathing Rhythm <span class="desc">Pulse sound like life support.</span></button>
        <button onclick="playTone('square', 50, 10, 0.8, 0.2)">43. Seismic Thud <span class="desc">Extreme low drop. Feel it in the bass.</span></button>
        <button onclick="playEcho('triangle', 1200, 1200, 0.1, 0.2, 0.2)">44. Crystal Ping <span class="desc">Pure triangle tone with spaced echoes.</span></button>
        <button onclick="playChord([440, 554, 659, 880], 0.6, 0.2)">45. Major Triumph <span class="desc">Full A-Major chord.</span></button>
        <button onclick="playChord([440, 523, 659, 880], 0.6, 0.2)">46. Minor Foreboding <span class="desc">Full A-Minor chord.</span></button>
        <button onclick="playTone('sawtooth', 440, 445, 1.0, 0.1)">47. Radio Interference <span class="desc">Dissonant sawtooth beating.</span></button>
        <button onclick="playSequence(['sine','sine'], [100, 1200], 0.2, 0.3)">48. Telemetry Burst <span class="desc">Low then high. Digital handshake.</span></button>
        <button onclick="playEcho('square', 400, 10, 0.1, 0.1, 0.05)">49. Machine Gun Fire <span class="desc">Rapid fire square bursts. Defense grid?</span></button>
        <button onclick="playSweep(800, 2000, 200, 0.6)">50. Deflector Shield <span class="desc">Rising then crashing frequency.</span></button>
        <button onclick="playEcho('sawtooth', 200, 200, 0.05, 0.2, 0.1)">51. Metal Ratchet <span class="desc">Mechanical clicking.</span></button>
        <button onclick="playTone('sine', 1000, 10, 0.1, 0.3)">52. Small Impact <span class="desc">Short, sharp drop.</span></button>
        <button onclick="playEcho('sine', 100, 10, 0.5, 0.4, 0.2)">53. Heavy Blast <span class="desc">Deep bass impact with echo.</span></button>
        <button onclick="playSequence(['square','sine'], [600, 200], 0.2, 0.2)">54. System Locked <span class="desc">Harsh start, soft finish.</span></button>
        <button onclick="playSequence(['sine','square'], [200, 600], 0.2, 0.2)">55. System Unlocked <span class="desc">Soft start, harsh finish.</span></button>
        <button onclick="playChord([300, 310, 320], 0.8, 0.2)">56. Engine Idle <span class="desc">Rough, textured mid-drone.</span></button>
        <button onclick="playEcho('sine', 5000, 100, 0.1, 0.2, 0.1)">57. Spark <span class="desc">Ultra-high electrical pop.</span></button>
        <button onclick="playSweep(50, 150, 50, 2.0)">58. The Abyss <span class="desc">Slow, deep breathing cycle.</span></button>
        <button onclick="playGlitchCustom(0.01, 2000)">59. Nano-Glitch <span class="desc">Micro-bursts of high noise.</span></button>
        <button onclick="playGlitchCustom(0.1, 100)">60. Low-Fi Scrape <span class="desc">Low frequency digital artifacts.</span></button>
        <button onclick="playTone('square', 1000, null, 0.02, 0.05)">61. Pixel Blink <span class="desc">The shortest possible square blip.</span></button>
        <button onclick="playEcho('triangle', 400, 800, 0.1, 0.2, 0.05)">62. Springy Boing <span class="desc">Tonal bounce effect.</span></button>
        <button onclick="playSequence(['sine','sine','sine'], [100, 200, 300], 0.05, 0.3)">63. Rapid Step <span class="desc">Quick mechanical movement.</span></button>
        <button onclick="playChord([1000, 1200, 1400], 0.05, 0.2)">64. Tech Click <span class="desc">High-frequency chord "click".</span></button>
        <button onclick="playTone('sawtooth', 10, 1000, 0.5, 0.1)">65. Ripping Reality <span class="desc">Sawtooth rising from sub-audible.</span></button>
        <button onclick="playEcho('sine', 300, 300, 0.02, 0.4, 0.02)">66. Reverb Room <span class="desc">A tiny sound in a very metallic space.</span></button>
        <button onclick="playSequence(['square','square','square'], [50, 60, 50], 0.2, 0.1)">67. Warning Growl <span class="desc">Low, aggressive square modulation.</span></button>
        <button onclick="playSweep(2000, 100, 2000, 0.3)">68. Alien Chirp <span class="desc">Fast V-shaped frequency sweep.</span></button>
    </div>

    <script>
        let ctx = null;
        function init() { if(!ctx) { ctx = new (window.AudioContext || window.webkitAudioContext)(); } if(ctx.state === 'suspended') ctx.resume(); }

        function playTone(type, f1, f2, dur, vol) {
            init(); const osc = ctx.createOscillator(); const gain = ctx.createGain();
            osc.type = type; const now = ctx.currentTime;
            osc.frequency.setValueAtTime(f1, now);
            if (f2) { try { osc.frequency.exponentialRampToValueAtTime(f2, now + dur); } catch(e) { osc.frequency.setValueAtTime(f2, now+dur); } }
            gain.gain.setValueAtTime(vol, now); gain.gain.exponentialRampToValueAtTime(0.01, now + dur);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(now); osc.stop(now + dur);
        }

        function playEcho(type, f1, f2, dur, vol, del) {
            init(); const osc = ctx.createOscillator(); const gain = ctx.createGain();
            const delay = ctx.createDelay(); const feedback = ctx.createGain();
            osc.type = type; const now = ctx.currentTime;
            osc.frequency.setValueAtTime(f1, now);
            if (f2) { try { osc.frequency.exponentialRampToValueAtTime(f2, now + dur); } catch(e) { osc.frequency.setValueAtTime(f2, now+dur); } }
            gain.gain.setValueAtTime(vol, now); gain.gain.exponentialRampToValueAtTime(0.01, now + dur);
            delay.delayTime.value = del; feedback.gain.value = 0.4;
            osc.connect(gain); gain.connect(ctx.destination);
            gain.connect(delay); delay.connect(feedback); feedback.connect(delay); delay.connect(ctx.destination);
            osc.start(now); osc.stop(now + dur);
        }

        function playSequence(types, freqs, dur, vol) {
            init(); freqs.forEach((f, i) => { setTimeout(() => playTone(types[i]||'sine', f, null, dur, vol), i * (dur * 1000)); });
        }

        function playSweep(f1, f2, f3, dur) {
            init(); const osc = ctx.createOscillator(); const gain = ctx.createGain();
            osc.type = 'sawtooth'; const now = ctx.currentTime;
            osc.frequency.setValueAtTime(f1, now);
            osc.frequency.linearRampToValueAtTime(f2, now + (dur/2));
            osc.frequency.linearRampToValueAtTime(f3, now + dur);
            gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0.01, now + dur);
            osc.connect(gain); gain.connect(ctx.destination); osc.start(now); osc.stop(now + dur);
        }

        function playChord(freqs, duration, vol) {
            init(); freqs.forEach(f => playTone('sine', f, null, duration, vol / freqs.length));
        }

        function playGlitch() {
            init(); for(let i=0; i<6; i++) { setTimeout(() => { let rFreq = Math.floor(Math.random() * 1000) + 200; playTone('square', rFreq, null, 0.03, 0.05); }, i * 40); }
        }

        function playGlitchCustom(dur, range) {
            init(); for(let i=0; i<8; i++) { setTimeout(() => { let rFreq = Math.floor(Math.random() * range) + 50; playTone('square', rFreq, null, dur, 0.05); }, i * (dur * 1200)); }
        }

        function playGame(sound) {
            switch(sound) {
                case 'move': playTone('sine', 400, null, 0.1, 0.35); break;
                case 'wrap': playTone('sine', 500, null, 0.08, 0.35); setTimeout(()=>playTone('sine',600,null,0.08,0.35), 80); break;
                case 'floorUp': playTone('triangle', 300, 600, 0.15, 0.25); break;
                case 'floorDown': playTone('triangle', 600, 300, 0.15, 0.25); break;
                case 'menu': playTone('square', 800, null, 0.05, 0.12); break;
                case 'turn': playTone('sine', 200, 50, 0.4, 0.45); break;
                case 'closeMenu': playEcho('triangle', 300, 30, 0.6, 0.3, 0.4); break;
                case 'unlockBuild': playSequence(['sine','sine','sine','sine'], [1000, 1500, 2000, 2500], 0.05, 0.2); break;
                case 'digStart': playEcho('square', 100, 50, 0.2, 0.1, 0.15); break;
                case 'lifeboat': playEcho('sine', 800, null, 0.1, 0.4, 0.3); break;
                case 'hazard': playSweep(400, 800, 400, 0.4); break;
                case 'menuSelect': playSequence(['square','square'], [200, 300], 0.1, 0.05); break;
                case 'powerUp': playTone('sine', 200, 800, 0.4, 0.3); break;
                case 'powerDown': playTone('sine', 800, 200, 0.4, 0.3); break;
                case 'success': playSequence(['sine','sine','sine'], [400, 523, 659], 0.1, 0.2); break;
                case 'reports': playTone('sine', 200, 800, 0.5, 0.3); playTone('triangle', 800, 200, 0.5, 0.2); break;
            }
        }
    </script>
</body>
</html>
